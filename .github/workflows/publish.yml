name: Build and Publish Docker Image

# Jalankan workflow ini secara otomatis setiap ada push ke branch main
on:
  push:
    branches:
      - main
    # Jangan jalankan jika perubahan hanya terjadi pada dokumentasi atau skrip utilitas lokal
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'update.sh'
      - 'update.bat'

env:
  REGISTRY: ghcr.io
  # Nama image akan mengikuti nama repositori GitHub Anda (contoh: ghcr.io/username/repo-name)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Izin krusial untuk mengunggah image ke GitHub Packages (GHCR)

    steps:
      # 1. Checkout kode repositori
      - name: Checkout repository
        uses: actions/checkout@v4

      # Konversi nama repositori menjadi lowercase secara dinamis karena GHCR menolak huruf kapital
      - name: Lowercase repository name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 2. Login ke GitHub Container Registry (GHCR)
      # Menggunakan token bawaan GitHub Actions, sehingga user tidak perlu mengatur secrets secara manual
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Ekstrak metadata (tag, label) untuk penamaan image
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      # 4. Set up QEMU (Penting: Untuk mendukung emulasi pembuatan image arsitektur ARM64 di runner x86)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4.5. Set up Docker Buildx (untuk mendukung cache tingkat lanjut)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build dan Push image ke GHCR (Mendukung Multi-Platform AMD64 & ARM64)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
